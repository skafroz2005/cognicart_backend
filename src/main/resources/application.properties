spring.application.name=cognicart-app
# Server Configuration
server.port=5454

# Database Configuration (MySQL)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.datasource.url=jdbc:mysql://localhost:3306/cognicart_ecommerce
# spring.datasource.username=root
# spring.datasource.password=${DB_PASSWORD}
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# Hibernate / JPA Configuration (Standard settings for this project type)
# "update" ensures tables are created/updated automatically based on your entities
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# razorpay.api.key = ${razorpay_api_key}
# razorpay.api.secret = ${razorpay_api_secret}
razorpay.api.key=${razorpay_api_key}
razorpay.api.secret=${razorpay_api_secret}

# AI Engine 1 (Attribute Extraction) configuration
# ai.engine.api.url=${AI_ENGINE_API_URL:https://generativelanguage.googleapis.com/v1beta/models}
# Prefer GEMINI_API_KEY or this dedicated property to avoid stale AI_ENGINE_API_KEY env override.
# ai.engine.gemini.key=AIzaSyAKPZK5GfA6ksQ24Myw9fei4nfhA_rjt8E
# ai.engine.api.key=AIzaSyAKPZK5GfA6ksQ24Myw9fei4nfhA_rjt8E
# ai.engine.model=${AI_ENGINE_MODEL:gemini-3-flash-preview}
# ai.engine.fallback-models=${AI_ENGINE_FALLBACK_MODELS:}
ai.engine.api.url=${AI_ENGINE_API_URL:https://generativelanguage.googleapis.com/v1beta/models}
ai.engine.gemini.key=${GEMINI_API_KEY}
ai.engine.api.key=${GEMINI_API_KEY}
ai.engine.model=${AI_ENGINE_MODEL:gemini-3-flash-preview}
ai.engine.fallback-models=${AI_ENGINE_FALLBACK_MODELS:}

# AI Engine 2 (Conversational Shopping) model fallback configuration
ai.mode.fallback-models=${AI_MODE_FALLBACK_MODELS:gemini-2.5-flash,gemini-2.0-flash}
